<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StripeInspector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stripe<span>Inspector</span></h1>
            <p>Security research tool for Stripe API key enumeration</p>
        </div>

        <div class="input-section">
            <div class="input-row">
                <div class="input-group" style="flex:3;">
                    <label>Stripe API Key</label>
                    <input type="text" id="keyInput" placeholder="sk_test_... or sk_live_..." autocomplete="off" spellcheck="false">
                </div>
                <div class="input-group" style="flex:1;">
                    <label>Auth Token (optional)</label>
                    <input type="password" id="tokenInput" placeholder="Bearer token" autocomplete="off">
                </div>
                <button class="btn btn-primary" id="inspectBtn">Inspect</button>
                <label class="deep-toggle" title="Fetch all pages instead of first 100 items">
                    <input type="checkbox" id="deepToggle">
                    <span>Deep</span>
                </label>
            </div>
            <div class="modules-section">
                <div class="modules-header" onclick="document.getElementById('modulesGrid').classList.toggle('open')">
                    <label>Modules</label>
                    <span class="modules-toggle" id="modulesCount">All selected</span>
                </div>
                <div class="modules-grid" id="modulesGrid">
                    <label class="module-chip"><input type="checkbox" value="account" checked><span>account</span></label>
                    <label class="module-chip"><input type="checkbox" value="balance" checked><span>balance</span></label>
                    <label class="module-chip"><input type="checkbox" value="customers" checked><span>customers</span></label>
                    <label class="module-chip"><input type="checkbox" value="charges" checked><span>charges</span></label>
                    <label class="module-chip"><input type="checkbox" value="payment_intents" checked><span>payment_intents</span></label>
                    <label class="module-chip"><input type="checkbox" value="products" checked><span>products</span></label>
                    <label class="module-chip"><input type="checkbox" value="payouts" checked><span>payouts</span></label>
                    <label class="module-chip"><input type="checkbox" value="subscriptions" checked><span>subscriptions</span></label>
                    <label class="module-chip"><input type="checkbox" value="invoices" checked><span>invoices</span></label>
                    <label class="module-chip"><input type="checkbox" value="webhooks" checked><span>webhooks</span></label>
                    <label class="module-chip"><input type="checkbox" value="events" checked><span>events</span></label>
                    <label class="module-chip"><input type="checkbox" value="connected" checked><span>connected</span></label>
                    <label class="module-chip"><input type="checkbox" value="disputes" checked><span>disputes</span></label>
                    <label class="module-chip"><input type="checkbox" value="refunds" checked><span>refunds</span></label>
                    <label class="module-chip"><input type="checkbox" value="balance_transactions" checked><span>balance_transactions</span></label>
                    <label class="module-chip"><input type="checkbox" value="coupons" checked><span>coupons</span></label>
                    <label class="module-chip"><input type="checkbox" value="permission_scan"><span>permission_scan</span></label>
                    <div class="modules-actions">
                        <button class="btn btn-outline btn-xs" onclick="toggleAllModules(true)">All</button>
                        <button class="btn btn-outline btn-xs" onclick="toggleAllModules(false)">None</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="status" id="status" style="display:none;"></div>

        <div class="results" id="results">
            <div id="resultsContent"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
